name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test uv package and container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: UVX import check
        run: uvx --from . python -c "import heartbeatmqtt; print(heartbeatmqtt.__version__)"

      - name: Docker build
        run: docker build -t heartbeatmqtt:ci .
