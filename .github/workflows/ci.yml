name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: python -m pip install uv
      - name: Sync
        run: uv sync
      - name: Ruff
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest
      - name: Build package
        run: uv build
      - name: Docker build
        run: docker build -t heartbeatmqtt:ci .
